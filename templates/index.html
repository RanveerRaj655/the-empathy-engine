<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Empathy Engine</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background-color: #1e1e1e; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); max-width: 600px; width: 100%; text-align: center; }
        h1 { margin-top: 0; color: #e0e0e0; }
        textarea { width: 100%; height: 100px; background-color: #2c2c2c; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 1rem; resize: none; box-sizing: border-box; margin-bottom: 1rem; }
        button { background-color: #6200ea; color: #fff; border: none; padding: 10px 20px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #7c4dff; }
        button:disabled { background-color: #444; cursor: not-allowed; }
        .results { margin-top: 2rem; display: none; }
        .badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; text-transform: uppercase; margin-bottom: 1rem; color: #000; }
        .intensity-bar-container { width: 100%; background-color: #333; border-radius: 10px; height: 20px; margin-bottom: 1rem; overflow: hidden; }
        .intensity-bar { height: 100%; background-color: #fff; width: 0%; transition: width 0.5s ease; }
        audio { width: 100%; margin-top: 1rem; outline: none; }
        .color-joy { background-color: gold; } .color-sadness { background-color: #4a9eff; } .color-anger { background-color: #ff4444; color: #fff; } .color-fear { background-color: #9b59b6; color: #fff; } .color-surprise { background-color: #ff8c00; } .color-disgust { background-color: #27ae60; color: #fff; } .color-neutral { background-color: #888; color: #fff; }
        .loader { border: 4px solid #333; border-top: 4px solid #6200ea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 1rem auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h1>The Empathy Engine</h1>
    <form id="synth-form"><textarea id="text-input" placeholder="Type something to detect the emotion..." required></textarea><br><button type="submit" id="submit-btn">Synthesize Emotion</button></form>
    <div class="loader" id="loader"></div>
    <div class="results" id="results">
        <div><span class="badge" id="emotion-badge">Neutral</span></div>
        <div style="text-align: left; font-size: 0.9em; margin-bottom: 5px;">Intensity: <span id="intensity-value">0%</span></div>
        <div class="intensity-bar-container"><div class="intensity-bar" id="intensity-bar"></div></div>
        <audio id="audio-player" controls></audio>
        <div style="font-size: 0.8em; color: #aaa; margin-top: 10px; text-align: left;" id="params-display"></div>
    </div>
</div>
<script>
    const form = document.getElementById('synth-form'), input = document.getElementById('text-input'), submitBtn = document.getElementById('submit-btn'), loader = document.getElementById('loader'), results = document.getElementById('results'), badge = document.getElementById('emotion-badge'), intensityBar = document.getElementById('intensity-bar'), intensityValue = document.getElementById('intensity-value'), audioPlayer = document.getElementById('audio-player'), paramsDisplay = document.getElementById('params-display');
    const emotionColors = { 'joy': 'color-joy', 'sadness': 'color-sadness', 'anger': 'color-anger', 'fear': 'color-fear', 'surprise': 'color-surprise', 'disgust': 'color-disgust', 'neutral': 'color-neutral' };
    form.addEventListener('submit', async (e) => {
        e.preventDefault(); const text = input.value.trim(); if (!text) return;
        submitBtn.disabled = true; results.style.display = 'none'; loader.style.display = 'block';
        const formData = new FormData(); formData.append("text", text);
        try {
            const response = await fetch('/synthesize', { method: 'POST', body: formData });
            const data = await response.json();
            const emotion = data.emotion.toLowerCase();
            badge.textContent = emotion.charAt(0).toUpperCase() + emotion.slice(1);
            badge.className = 'badge'; if (emotionColors[emotion]) badge.classList.add(emotionColors[emotion]);
            const intensityPercent = Math.round(data.intensity * 100);
            intensityBar.style.width = intensityPercent + '%'; intensityValue.textContent = intensityPercent + '%';
            intensityBar.style.backgroundColor = window.getComputedStyle(badge).backgroundColor;
            audioPlayer.src = data.audio_url; audioPlayer.play().catch(e => console.log("Audio play prevented", e));
            paramsDisplay.innerHTML = `Speed: ${data.params.speed.toFixed(2)} | Pitch: ${data.params.pitch.toFixed(2)} | Volume: ${data.params.volume.toFixed(2)} dB`;
            results.style.display = 'block';
        } catch (error) { alert('Error generating audio: ' + error.message); } finally { submitBtn.disabled = false; loader.style.display = 'none'; }
    });
</script>
</body>
</html>
